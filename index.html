function renderChallenges(){
  if(!S.challengeSteps)S.challengeSteps={};
  if(!S.completedChainStages)S.completedChainStages=[];
  const cards=CHALLENGE_CHAINS.map(chain=>{
    const isHidden=chain.hidden&&!chain.revealCondition(S);
    if(isHidden){
      return`<div class="card" style="opacity:0.5;text-align:center;padding:20px">
        <div style="font-size:28px;margin-bottom:8px">🔒</div>
        <div style="font-weight:700;font-size:15px;color:var(--text-muted)">??? Hidden Path</div>
        <div style="font-size:12px;color:var(--text-dim);margin-top:6px">${chain.revealHint}</div>
      </div>`;
    }
    // Find current active stage
    let activeStageIdx=0;
    for(let i=0;i<chain.stages.length;i++){
      if(S.completedChainStages.includes(chain.stages[i].rewardId))activeStageIdx=i+1;
      else break;
    }
    const isChainComplete=activeStageIdx>=chain.stages.length;
    // Completed stages summary
    const completedBadges=chain.stages.slice(0,activeStageIdx).map(st=>`
      <div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--card-border)">
        <span style="font-size:16px">${st.rewardEmoji}</span>
        <div>
          <div style="font-size:12px;font-weight:700;color:var(--green)">✓ ${st.reward} earned</div>
          <div style="font-size:11px;color:var(--text-dim)">${st.title}</div>
        </div>
        <button class="btn${S.activeTitle===st.rewardId?" btn-primary":""}" style="margin-left:auto;font-size:10px;padding:3px 8px" onclick="setTitle('${st.rewardId}')">${S.activeTitle===st.rewardId?"✓ Active":"Equip"}</button>
      </div>`).join("");
    // Active stage
    let activeStageHtml="";
    if(!isChainComplete){
      const stage=chain.stages[activeStageIdx];
      const stepsDone=stage.steps.filter(s=>S.challengeSteps[s.id]).length;
      const allDone=stepsDone===stage.steps.length;
      const stepsHtml=stage.steps.map(s=>`
        <label style="display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid #1e1e2e;cursor:pointer">
          <input type="checkbox" ${S.challengeSteps[s.id]?"checked":""} onchange="toggleStep('${s.id}')" style="margin-top:2px;accent-color:var(--accent);width:16px;height:16px;flex-shrink:0">
          <span style="font-size:13px;color:${S.challengeSteps[s.id]?"var(--text-dim)":"var(--text)"};${S.challengeSteps[s.id]?"text-decoration:line-through":""};line-height:1.5">${s.text}</span>
        </label>`).join("");
      activeStageHtml=`
        <div style="margin-top:${activeStageIdx>0?14:0}px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
            <div>
              <div style="font-size:12px;font-weight:700;color:var(--text-muted)">${stage.title}</div>
              <div style="font-size:11px;color:var(--text-dim)">${stepsDone}/${stage.steps.length} steps complete</div>
            </div>
            <div style="text-align:right">
              <div style="font-size:18px">${stage.rewardEmoji}</div>
              <div style="font-size:10px;color:var(--gold);font-weight:700">${stage.reward}</div>
            </div>
          </div>
          <div style="height:4px;background:var(--bg);border-radius:2px;margin-bottom:12px;overflow:hidden">
            <div style="height:100%;width:${Math.round(stepsDone/stage.steps.length*100)}%;background:var(--accent);border-radius:2px;transition:width 0.4s"></div>
          </div>
          ${stepsHtml}
          ${allDone?`<button class="btn btn-primary" style="margin-top:12px;width:100%" onclick="claimStage('${stage.rewardId}','${chain.id}',${activeStageIdx})">🏅 Claim Title: ${stage.rewardEmoji} ${stage.reward}</button>`:""}
        </div>`;
    }
    const chainColor=chain.focus?{learning:"#2d7a2d",mindset:"#1a6a9a",creative:"#7b3fcf",career:"#a07800",networking:"#c0392b",productivity:"#d4870a"}[chain.focus]||"#888":"#7b3fcf";
    return`<div class="card">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
        <span style="font-size:26px">${chain.emoji}</span>
        <div>
          <div style="font-weight:800;font-size:15px;color:var(--text)">${chain.name}</div>
          <div style="font-size:11px;color:var(--text-dim)">${isChainComplete?"✨ Chain complete":"Stage ".concat(activeStageIdx+1," of ",chain.stages.length)}</div>
        </div>
        ${isChainComplete?`<span style="margin-left:auto;font-size:11px;color:var(--green);font-weight:700">COMPLETE</span>`:""}
      </div>
      ${completedBadges}
      ${isChainComplete?"":`${activeStageHtml}`}
    </div>`;
  }).join("");
  const anyUnlocked=S.completedChainStages&&S.completedChainStages.length>0;
  return`<div>
    <div class="card" style="margin-bottom:10px">
      <div style="font-weight:700;font-size:14px;color:var(--text);margin-bottom:4px">⚔️ Challenge Paths</div>
      <div class="section-desc">Real-life multi-step challenges. Complete every step in a stage to earn a unique title. Steps are self-reported — your honor system.</div>
    </div>
    ${cards}
  </div>`;
}

function renderQuestHub(){
  const ti=getTierIndex(S.level);
  const dDone=S.dailyCompleted.filter(id=>S.activeDailyIds.includes(id)||S.customDailyQuests.some(q=>q.id===id)).length;
  const dTotal=S.activeDailyIds.length+S.customDailyQuests.length;
  const dPending=dTotal-dDone;
  const subTabs=[
    {k:"dailies",    icon:"⚔️", label:"Dailies",    badge:dPending>0?dPending:0},
    {k:"epics",      icon:"🗺️", label:"Epics",      badge:0},
    {k:"challenges", icon:"🏅", label:"Challenges", badge:0},
  ];
  const subBar=`<div class="sub-tab-bar">${subTabs.map(t=>`
    <button class="sub-tab-btn${QTAB===t.k?" active":""}" onclick="go_q('${t.k}')">
      <span class="st-icon">${t.icon}</span>
      <span>${t.label}</span>
      ${t.badge?`<span class="st-badge">${t.badge}</span>`:""}

      <div style="font-size:10px;color:var(--text-dim)">${nextLabel}</div>

function getUnequippedCount(){
  // Count items in inventory that can be equipped but aren't
  const inv=S.gearInventory||[];
  let count=0;
  GEAR_SLOTS_ORDER.forEach(slot=>{
    const equippedId=S.equippedGear&&S.equippedGear[slot];
    const found=GEAR_DB.filter(g=>g.slot===slot&&inv.includes(g.id));
    const betterExists=found.some(item=>{
      if(item.id===equippedId)return false;
      const {can}=canEquipItem(item);
      if(!can)return false;
      // Is it better rarity than equipped?
      const curItem=equippedId?GEAR_DB.find(g=>g.id===equippedId):null;
      const rarityVal={Common:0,Uncommon:1,Rare:2,Epic:3,Legendary:4};
      return!curItem||(rarityVal[item.rarity]||0)>(rarityVal[curItem.rarity]||0);
    });
    if(betterExists)count++;
  });
  return count;
}
window.equipGear=function(slot,id){
  if(!S.equippedGear)S.equippedGear={};
  const item=GEAR_DB.find(g=>g.slot===slot&&g.id===id);
  if(!item)return;
  const {can,missing}=canEquipItem(item);
  if(!can){toast("Can't equip",`Need: ${missing.join(", ")}`);return;}
  S.equippedGear[slot]=id;
  save();render();
  toast("Equipped!",`${item.emoji||""} ${item.name}${item.effect?" — "+item.effect:""}`);
};
window.unequipGear=function(slot){
  if(!S.equippedGear)return;
  delete S.equippedGear[slot];
  save();render();
  toast("Unequipped",`${SLOT_LABELS[slot]} slot is now empty.`);
};
window.spendSkillPoint=function(skillId){
  if(!S.skillRanks)S.skillRanks={};
  if((S.skillPoints||0)<=0)return;
  const rank=S.skillRanks[skillId]||0;
  // Find skill to check maxRank
  const tree=getClassTree();
  let sk=null;
  tree.tiers.forEach(t=>t.skills.forEach(s=>{if(s.id===skillId)sk=s;}));
  if(!sk||rank>=sk.maxRank)return;
  S.skillRanks[skillId]=rank+1;
  S.skillPoints--;
  save();render();
  toast("Skill Upgraded",`${sk.emoji} ${sk.name} — ${sk.perRank}`);
};
window.refundSkillPoint=function(skillId){
  if(!S.skillRanks)S.skillRanks={};
  const rank=S.skillRanks[skillId]||0;
  if(rank<=0)return;
  // Check if refunding would lock a tier that has points spent
  const tree=getClassTree();
  const newTotal=getTotalSkillPointsSpent()-1;
  // Validate no higher tier becomes locked with points spent
  let valid=true;
  tree.tiers.forEach((tier,ti)=>{
    if(ti===0)return;
    if(newTotal<tier.req){
      const hasPointsInTier=tier.skills.some(s=>(S.skillRanks[s.id]||0)>0);
      if(hasPointsInTier){valid=false;}
    }
  });
  if(!valid){toast("Can't refund","Refunding would invalidate a higher tier. Remove those points first.");return;}
  S.skillRanks[skillId]=rank-1;
  S.skillPoints++;
  save();render();
};

// ── SOUND SYSTEM ─────────────────────────────────────────────────────────────
let _audioCtx=null;
function getAudioCtx(){
  if(!_audioCtx)_audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(_audioCtx.state==='suspended')_audioCtx.resume();
  return _audioCtx;
}
function playSound(type){
  try{
    const ctx=getAudioCtx();
    if(type==='quest'){
      [[523,0,0.3],[659,0.1,0.3],[784,0.2,0.4]].forEach(([freq,delay,dur])=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);
        o.type='sine';o.frequency.value=freq;
        const t=ctx.currentTime+delay;
        g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.22,t+0.02);
        g.gain.exponentialRampToValueAtTime(0.001,t+dur);
        o.start(t);o.stop(t+dur);
      });
    }else if(type==='levelup'){
      [[261,0,0.7],[329,0.1,0.6],[392,0.2,0.6],[523,0.32,0.9],[659,0.48,0.8],[784,0.62,1.1],[1047,0.78,1.3]].forEach(([freq,delay,dur])=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);
        o.type='triangle';o.frequency.value=freq;
        const t=ctx.currentTime+delay;
        g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.3,t+0.04);
        g.gain.exponentialRampToValueAtTime(0.001,t+dur);
        o.start(t);o.stop(t+dur);
      });
    }else if(type==='gold'){
      [[1047,0,0.15],[1319,0.05,0.15],[1568,0.1,0.2]].forEach(([freq,delay,dur])=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);
        o.type='sine';o.frequency.value=freq;
        const t=ctx.currentTime+delay;
        g.gain.setValueAtTime(0.18,t);
        g.gain.exponentialRampToValueAtTime(0.001,t+dur);
        o.start(t);o.stop(t+dur+0.05);
      });
    }
  }catch(e){}
}

function showLevelUp(newLevel,tierChanged,newTierName){
  const cl=CLASSES[S.profile.playerClass];
  const el=document.getElementById('levelup-screen');
  if(!el)return;
  document.getElementById('lu-emoji').innerHTML=gi(CLASS_ICON[S.profile.playerClass]||"warrior_icon",56);
  document.getElementById('lu-num').textContent=newLevel;
  document.getElementById('lu-class-name').textContent=cl?cl.name.toUpperCase():'WARRIOR';
  const sp=S.skillPoints||0;
  document.getElementById('lu-tier-line').textContent=tierChanged?`⬆️  ${newTierName} Tier Unlocked!`:sp>0?`✨ ${sp} skill point${sp>1?"s":""} available`:'';
  el.classList.add('show');
  milestoneParticles(cl?cl.color:'#9b6fef');
  playSound('levelup');
  // Zone transition
  const newZoneKey=getZoneKey(newLevel);
  if(S.lastZoneKey&&S.lastZoneKey!==newZoneKey){
    const zi=getZoneInfo(newLevel);
    const isNewZone=zi.sub.sub===1;
    setTimeout(()=>{
      centerNotify(gi(ZONE_ICON[zi.zone.zone]||"village",40),isNewZone?"⚔️ New Zone":"📍 New Area",`${zi.zone.zone}-${zi.sub.sub} · ${zi.sub.name}`,zi.sub.vibe,zi.zone.color,4000);
      milestoneParticles(zi.zone.color);
      addLog(`${zi.zone.emoji} ${isNewZone?"New zone":"New area"}: ${zi.sub.name}`);
    },isNewZone?900:500);
  }
  S.lastZoneKey=newZoneKey;
  save();
}

// ── RADAR CHART ───────────────────────────────────────────────────────────────
function renderRadarChart(){
  const W=300,H=270,cx=150,cy=132,r=98;
  const keys=['STR','INT','VIT','WP','CRF'];
  const MAX=250;
  const statColors={STR:'#e05050',INT:'#4a9fd4',VIT:'#3dba6a',WP:'#9b6fef',CRF:'#f0a030'};
  const ang=i=>(i*72-90)*Math.PI/180;
  const pt=(i,pct)=>({x:cx+r*pct*Math.cos(ang(i)),y:cy+r*pct*Math.sin(ang(i))});
  // Grid rings
  const grid=[0.25,0.5,0.75,1].map((pct,gi)=>{
    const pts=keys.map((_,i)=>pt(i,pct));
    return`<polygon points="${pts.map(p=>`${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ')}" fill="none" stroke="var(--card-border)" stroke-width="${gi===3?1.5:0.8}" opacity="${0.3+gi*0.15}"/>`;
  }).join('');
  // Axis lines
  const axes=keys.map((_,i)=>{const e=pt(i,1);return`<line x1="${cx}" y1="${cy}" x2="${e.x.toFixed(1)}" y2="${e.y.toFixed(1)}" stroke="var(--card-border)" stroke-width="1"/>`;}).join('');
  // Stat polygon
  const cl=CLASSES[S.profile.playerClass];
  const fillColor=cl?cl.color:'#9b6fef';
  const valPts=keys.map((k,i)=>{const pct=Math.min((S.stats[k]||0)/MAX,1);const p=pt(i,Math.max(pct,0.05));return`${p.x.toFixed(1)},${p.y.toFixed(1)}`;}).join(' ');
  // Dots
  const dots=keys.map((k,i)=>{const pct=Math.min((S.stats[k]||0)/MAX,1);const p=pt(i,Math.max(pct,0.05));return`<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="3.5" fill="${fillColor}" stroke="var(--card)" stroke-width="2"/>`;}).join('');
  // Labels
  const labels=keys.map((k,i)=>{
    const p=pt(i,1.3);const col=statColors[k];const val=S.stats[k]||0;
    return`<text x="${p.x.toFixed(1)}" y="${(p.y-6).toFixed(1)}" text-anchor="middle" fill="${col}" font-size="11" font-weight="800" font-family="Nunito,sans-serif">${k}</text><text x="${p.x.toFixed(1)}" y="${(p.y+8).toFixed(1)}" text-anchor="middle" fill="${col}" font-size="10" font-family="Nunito,sans-serif" opacity="0.75">${val}</text>`;
  }).join('');
  return`<div class="radar-wrap"><svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:${W}px;display:block;margin:0 auto">${grid}${axes}<polygon points="${valPts}" fill="${fillColor}" fill-opacity="0.15" stroke="${fillColor}" stroke-width="2" stroke-linejoin="round"/>${dots}${labels}</svg></div>`;
}

function applyClassTheme() {
  const root = document.documentElement;
  root.style.setProperty('--accent',      '#c8922a');
  root.style.setProperty('--accent-bg',   '#1e1608');
  root.style.setProperty('--bg',          '#100e08');
  root.style.setProperty('--bg2',         '#161208');
  root.style.setProperty('--card',        '#1c1810');
  root.style.setProperty('--card-border', '#2e2618');
  // Fantasy landscape background
  document.body.style.backgroundImage = [
    'radial-gradient(ellipse 35% 50% at 0% 30%,   rgba(255,140,20,0.08) 0%, transparent 60%)',
    'radial-gradient(ellipse 35% 50% at 100% 30%, rgba(255,140,20,0.08) 0%, transparent 60%)',
    'radial-gradient(ellipse 60% 30% at 50% 100%, rgba(0,0,0,0.6) 0%, transparent 70%)',
    STONE_WALL_SVG
  ].join(',');
  document.body.style.backgroundSize = 'cover';
  document.body.style.backgroundPosition = 'center top';
  document.body.style.backgroundAttachment = 'fixed';
  document.body.style.backgroundColor = '#141008';
  document.body.style.backgroundSize = 'auto, auto, auto, 90px 56px';
}

window.dismissClassPopup=function(){

let _popupShown=false;
function showClassPopup(){
  if(_popupShown)return;
  const cls=S.profile&&S.profile.playerClass;
  const g=CLASS_GREETINGS[cls];
  const cl=CLASSES[cls];
  if(!g||!cl)return;
  _popupShown=true;
  const el=document.getElementById("class-popup");
  if(!el)return;
  el.style.setProperty("--popup-color",cl.color);
  el.style.setProperty("--popup-glow",cl.color+"44");
  el.style.display="flex";
  document.getElementById("popup-emoji").innerHTML=gi(CLASS_ICON[cls]||"warrior_icon",52);
  document.getElementById("popup-classname").textContent=cl.name.toUpperCase();
  document.getElementById("popup-line1").textContent=g.line1;
  document.getElementById("popup-line2").textContent=g.line2;
  el.querySelector(".popup-enter-btn").textContent=`Enter the ${cl.name}`;
  requestAnimationFrame(()=>requestAnimationFrame(()=>el.classList.add("visible")));
  setTimeout(()=>dismissClassPopup(),4500);
}

const TABS={quests:renderQuestHub,shop:renderShop,character:renderCharacter,stats:renderStats,profile:renderProfile,log:renderLog};

function render(){
  applyClassTheme();
  if(!S.profile.name){document.getElementById("app").innerHTML=renderOnboarding();document.getElementById("bottom-nav").style.display="none";return;}
  document.getElementById("bottom-nav").style.display="flex";
  if(OB.step===99){document.getElementById("app").innerHTML=renderEditFocuses();renderTabs();return;}
  OB.step=1;
  renderTabs();
  document.getElementById("app").innerHTML=renderHeader()+(TABS[TAB]||renderQuests)();

}

window.changeNotifTime=async function(){
  const val=prompt(`Set reminder time (24hr format, e.g. 08:00)\nCurrent: ${S.notifTime||"not set"}\n\nEnter any time like 06:30 or 20:00`,"");
  if(!val)return;
  const trimmed=val.trim();
  if(!/^\d{1,2}:\d{2}$/.test(trimmed)){toast("Invalid format","Use HH:MM like 08:00 or 20:30");return;}
  const granted=await requestNotifPermission();
  if(!granted){toast("Notifications blocked","Enable them in browser settings.");return;}
  S.notifEnabled=true;S.notifTime=trimmed;save();render();toast("Reminder updated!",`Daily nudge at ${trimmed}`);
};
