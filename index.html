<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Life RPG">
<title>Life RPG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e14;
    --bg2: #14141e;
    --card: #1a1a28;
    --card-border: #2a2a3e;
    --text: #dde0f0;
    --text-muted: #6a6a88;
    --text-dim: #4a4a62;
    --gold: #f0c040;
    --gold-dim: #8a6c10;
    --purple: #9b6fef;
    --green: #3dba6a;
    --red: #e05050;
    --nav-h: 62px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }
  #app { max-width: 100%; margin: 0 auto; padding: 16px 20px; padding-bottom: calc(var(--nav-h) + 16px); }

  .card { background: var(--card); border: 1px solid var(--card-border); border-radius: 18px; padding: 16px; margin-bottom: 10px; }
  .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; flex-wrap: wrap; gap: 6px; }
  .player-name { font-weight: 700; font-size: 16px; color: var(--text); }
  .gold { font-weight: 700; color: var(--gold); font-size: 15px; letter-spacing: 0.5px; }
  .xp-bar-wrap { height: 12px; background: #1e1e2e; border-radius: 12px; overflow: hidden; margin-bottom: 12px; border: 1px solid var(--card-border); }
  .xp-bar { height: 100%; border-radius: 12px; transition: width 0.6s ease; box-shadow: 0 0 8px currentColor; }
  .xp-label { font-size: 11px; color: var(--text-muted); margin-bottom: 5px; }
  .stats-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .stat-box { border: 1px solid var(--card-border); border-radius: 14px; padding: 8px 10px; text-align: center; min-width: 62px; flex: 1; background: var(--bg2); }
  .stat-key { font-size: 10px; color: var(--text-muted); letter-spacing: 0.5px; }
  .stat-val { font-size: 20px; font-weight: 700; color: var(--text); }
  .stat-name { font-size: 9px; color: var(--text-dim); margin-top: 1px; }
  .tier-badge { display: inline-block; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 10px; border: 1px solid; letter-spacing: 0.5px; }
  .next-tier-hint { font-size: 10px; color: var(--text-dim); margin-bottom: 6px; }
  .class-tag { display: inline-block; font-size: 11px; padding: 1px 7px; border-radius: 14px; margin-left: 6px; }

  /* ── BOTTOM NAV ── */
  .bottom-nav {
    position: fixed; bottom: 0;
    height: var(--nav-h);
    background: var(--bg2);
    border-top: 1px solid var(--card-border);
    display: flex; align-items: stretch;
    width: 100%;
    left: 0;
    z-index: 100;
  }
  .nav-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 2px; font-family: 'Nunito', sans-serif; font-size: 8px; color: var(--text-dim);
    border: none; background: none; cursor: pointer; padding: 4px 2px;
    border-top: 2px solid transparent; transition: color 0.15s, border-color 0.15s;
  }
  .nav-btn .nav-icon { font-size: 16px; line-height: 1; }
  .nav-btn.active { color: var(--text); border-top-color: var(--gold); }
  .nav-btn .nav-badge {
    position: absolute; top: 6px; right: calc(50% - 16px);
    font-size: 8px; background: var(--red); color: #fff;
    border-radius: 14px; padding: 1px 4px; font-weight: 700; display: none;
  }
  .nav-btn { position: relative; }
  .nav-btn .nav-badge.show { display: block; }

  .section-desc { font-size: 12px; color: var(--text-muted); margin-bottom: 12px; line-height: 1.6; }
  .reset-note { font-size: 11px; color: var(--text-dim); margin-bottom: 8px; }
  .pool-info { font-size: 11px; color: var(--text-muted); margin-bottom: 10px; padding: 6px 10px; background: var(--bg); border-radius: 12px; border: 1px solid var(--card-border); }

  .quest { border-bottom: 1px solid var(--card-border); padding: 12px 0; }
  .quest:last-child { border-bottom: none; }
  .quest.done { opacity: 0.35; }
  .quest-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
  .quest-left { flex: 1; }
  .quest-title { font-weight: 600; font-size: 13px; color: var(--text); }
  .quest.done .quest-title { text-decoration: line-through; }
  .quest-desc { font-size: 12px; color: var(--text-muted); margin: 4px 0 6px; line-height: 1.5; }
  .quest-rewards { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .tag-gold { font-size: 11px; color: var(--gold); font-weight: 600; }
  .tag-xp   { font-size: 11px; color: var(--text-muted); }
  .tag-stat { font-size: 11px; color: var(--text-dim); }
  .bonus-xp { font-size: 10px; color: var(--purple); font-weight: 600; border: 1px solid var(--purple); padding: 1px 5px; border-radius: 14px; }
  .badge { font-size: 10px; border: 1px solid; padding: 1px 6px; border-radius: 14px; display: inline-block; margin-right: 4px; }
  .badge-easy      { color: #3dba6a; border-color: #3dba6a; }
  .badge-medium    { color: var(--gold); border-color: var(--gold-dim); }
  .badge-hard      { color: var(--red); border-color: var(--red); }
  .badge-epic      { color: var(--purple); border-color: var(--purple); }
  .badge-legendary { color: #f0a030; border-color: #f0a030; }
  .quest-meta { display: flex; align-items: center; flex-wrap: wrap; gap: 4px; margin-bottom: 3px; }
  .quest-dur { font-size: 11px; color: var(--text-dim); }
  .quest-actions { display: flex; flex-direction: column; gap: 4px; align-items: flex-end; min-width: 60px; }
  .check { font-size: 18px; color: var(--green); }

  .locked-section-label { font-size: 12px; font-weight: 600; color: var(--text-dim); margin: 14px 0 8px; padding-top: 14px; border-top: 1px solid var(--card-border); }
  .locked-quest-row { border-bottom: 1px solid #1e1e2e; padding: 8px 0; display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; opacity: 0.4; }
  .locked-quest-row:last-child { border-bottom: none; }
  .lock-label { font-size: 11px; color: var(--text-dim); white-space: nowrap; }

  .btn { padding: 6px 14px; font-size: 12px; font-family: 'Nunito', sans-serif; border-radius: 12px; border: 1px solid var(--card-border); background: var(--bg); color: var(--text); cursor: pointer; white-space: nowrap; transition: background 0.15s, border-color 0.15s; }
  .btn:hover:not(:disabled) { background: #22223a; border-color: #3a3a58; }
  .btn:disabled { color: var(--text-dim); border-color: var(--card-border); cursor: not-allowed; opacity: 0.5; }
  .btn-sm { padding: 4px 8px; font-size: 11px; color: var(--red); border-color: var(--red); }
  .btn-sm:hover { background: #2a1010; }
  .btn-primary { background: #2a2050; color: var(--text); border-color: var(--purple); }
  .btn-primary:hover:not(:disabled) { background: #3a3070; }
  .btn-primary:disabled { opacity: 0.4; }
  .btn-danger { background: var(--bg); color: var(--red); border-color: var(--red); }
  .btn-danger:hover { background: #2a1010; }

  .shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  @media (min-width: 900px) {
    #app { padding: 20px 40px; }
    .card { border-radius: 18px; }
    .shop-grid { grid-template-columns: 1fr 1fr 1fr; }
  }
  @media (min-width: 1200px) {
    #app { padding: 24px 80px; }
    .shop-grid { grid-template-columns: 1fr 1fr 1fr 1fr; }
  }
  .shop-item { border: 1px solid var(--card-border); border-radius: 14px; padding: 10px; background: var(--bg2); }
  .shop-item.cant-afford { opacity: 0.6; }
  .shop-item.tier-locked { opacity: 0.35; }
  .shop-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 6px; }
  .shop-title { font-weight: 600; font-size: 12px; margin-bottom: 3px; color: var(--text); }
  .shop-desc  { font-size: 11px; color: var(--text-muted); line-height: 1.4; }
  .shop-cost  { font-size: 14px; font-weight: 700; white-space: nowrap; }
  .cost-ok { color: var(--gold); }
  .cost-no { color: var(--text-dim); }
  .shop-right { text-align: right; }
  .shop-count { font-size: 10px; color: var(--text-dim); margin-top: 2px; }
  .shop-lock  { font-size: 10px; color: var(--red); margin-top: 2px; }

  .stat-full { margin-bottom: 14px; }
  .stat-full-top { display: flex; justify-content: space-between; margin-bottom: 4px; }
  .stat-bar-wrap { height: 7px; background: var(--bg); border-radius: 14px; overflow: hidden; border: 1px solid var(--card-border); }
  .stat-bar { height: 100%; border-radius: 14px; transition: width 0.5s; }
  .lifetime { border-top: 1px solid var(--card-border); padding-top: 14px; margin-top: 14px; }
  .lrow { font-size: 13px; color: var(--text-muted); margin-bottom: 5px; }
  .brackets-section { border-top: 1px solid var(--card-border); padding-top: 14px; margin-top: 14px; }
  .bracket-row { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 1px solid #1e1e2e; }
  .bracket-row:last-child { border-bottom: none; }
  .bracket-emoji { font-size: 18px; width: 26px; text-align: center; padding-top: 1px; }
  .bracket-info { flex: 1; }
  .bracket-name { font-size: 13px; font-weight: 700; }
  .bracket-req { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
  .bracket-unlocks { font-size: 11px; color: var(--text-muted); margin-top: 4px; line-height: 1.6; }
  .bracket-status { font-size: 11px; font-weight: 600; white-space: nowrap; padding-top: 2px; }

  .log-entry { border-bottom: 1px solid var(--card-border); padding: 8px 0; display: flex; gap: 10px; }
  .log-time  { font-size: 11px; color: var(--text-dim); white-space: nowrap; }
  .log-msg   { font-size: 12px; color: var(--text-muted); }
  .empty-msg { font-size: 13px; color: var(--text-dim); }

  .form-group { margin-bottom: 12px; }
  label.flabel { font-size: 12px; font-weight: 600; color: var(--text-muted); display: block; margin-bottom: 4px; }
  .finput { width: 100%; padding: 8px 10px; font-size: 13px; font-family: 'Nunito', sans-serif; border: 1px solid var(--card-border); border-radius: 12px; color: var(--text); background: var(--bg); }
  .finput:focus { outline: none; border-color: var(--purple); }
  textarea.finput { resize: vertical; min-height: 58px; }
  .frow { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  @media (max-width: 400px) { .frow { grid-template-columns: 1fr; } }
  .stat-checks { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .stat-chk { display: flex; align-items: center; gap: 3px; font-size: 12px; cursor: pointer; color: var(--text-muted); }
  .stat-num { width: 42px; font-family: 'Nunito', sans-serif; font-size: 12px; border: 1px solid var(--card-border); border-radius: 14px; padding: 2px 4px; background: var(--bg); color: var(--text); }
  .section-sep { border-top: 1px solid var(--card-border); padding-top: 14px; margin-top: 16px; }
  .sec-title { font-size: 13px; font-weight: 600; margin-bottom: 8px; color: var(--text); }
  .ai-note { font-size: 11px; color: var(--text-dim); margin-top: 5px; line-height: 1.5; }
  .ai-note a { color: var(--text-muted); }
  .ai-err { font-size: 12px; color: var(--red); margin-top: 8px; }
  .gen-quest { border: 1px solid var(--card-border); border-radius: 14px; padding: 10px; margin-bottom: 8px; background: var(--bg); }
  .gen-title { font-weight: 600; font-size: 13px; margin-bottom: 3px; color: var(--text); }
  .gen-desc  { font-size: 12px; color: var(--text-muted); margin-bottom: 7px; line-height: 1.4; }
  .gen-meta  { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 8px; }
  .gen-actions { display: flex; gap: 6px; }
  .gen-list-label { font-size: 12px; color: var(--text-muted); margin: 12px 0 8px; }

  /* ONBOARDING */
  .ob-wrap { max-width: 520px; margin: 20px auto; }
  .ob-progress { height: 3px; background: var(--card-border); border-radius: 2px; margin-bottom: 22px; overflow: hidden; }
  .ob-progress-fill { height: 100%; background: linear-gradient(90deg, var(--purple), var(--gold)); border-radius: 2px; transition: width 0.4s ease; }
  .ob-step-label { font-size: 10px; color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 14px; }
  .ob-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; color: var(--text); line-height: 1.3; }
  .ob-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; line-height: 1.6; }
  .ob-name { width: 100%; padding: 12px 14px; font-size: 18px; font-family: 'Nunito', sans-serif; border: 2px solid var(--card-border); border-radius: 14px; margin-bottom: 16px; background: var(--bg); color: var(--text); }
  .ob-name:focus { outline: none; border-color: var(--purple); }

  /* Question option buttons */
  .ob-options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
  .ob-option {
    display: flex; align-items: center; gap: 12px;
    padding: 13px 14px; border: 2px solid var(--card-border);
    border-radius: 14px; background: var(--bg2); cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    font-family: 'Nunito', sans-serif; text-align: left; width: 100%;
  }
  .ob-option:hover { border-color: #3a3a58; background: #1e1e2e; }
  .ob-option.selected { border-color: var(--purple); background: #1e1830; }
  .ob-option-emoji { font-size: 20px; flex-shrink: 0; line-height: 1; }
  .ob-option-text { font-size: 13px; font-weight: 600; color: var(--text); }
  .ob-option-sub { font-size: 11px; color: var(--text-muted); margin-top: 1px; }

  /* Class reveal */
  .class-reveal { text-align: center; padding: 8px 0 16px; }
  .class-reveal-emoji { font-size: 64px; line-height: 1; margin-bottom: 14px; display: block; animation: crBounce 0.6s cubic-bezier(0.34,1.56,0.64,1) both; }
  .class-reveal-label { font-size: 11px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; opacity: 0.6; margin-bottom: 6px; }
  .class-reveal-name { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
  .class-reveal-desc { font-size: 13px; color: var(--text-muted); line-height: 1.6; margin-bottom: 18px; }
  .class-reveal-perks { text-align: left; background: var(--bg); border-radius: 14px; padding: 12px 14px; border: 1px solid var(--card-border); margin-bottom: 16px; }
  .class-reveal-perk { font-size: 12px; color: var(--text-muted); margin-bottom: 5px; padding-left: 14px; position: relative; }
  .class-reveal-perk::before { content:"✦"; position:absolute; left:0; color: var(--gold); font-size:9px; top:2px; }
  .class-reveal-perk:last-child { margin-bottom: 0; }
  .class-reveal-focuses { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; margin-bottom: 18px; }
  .class-reveal-focus-tag { font-size: 11px; border: 1px solid var(--card-border); border-radius: 10px; padding: 3px 10px; color: var(--text-muted); }
  @keyframes crBounce { from{opacity:0;transform:scale(0.4) translateY(20px)} to{opacity:1;transform:scale(1) translateY(0)} }

  /* Notification setup */
  .notif-options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 18px; }
  .notif-option {
    padding: 12px 10px; border: 2px solid var(--card-border); border-radius: 14px;
    background: var(--bg2); cursor: pointer; text-align: center;
    font-family: 'Nunito', sans-serif; transition: border-color 0.15s, background 0.15s;
  }
  .notif-option:hover { border-color: #3a3a58; }
  .notif-option.selected { border-color: var(--gold); background: #1e1a10; }
  .notif-option-emoji { font-size: 22px; margin-bottom: 4px; }
  .notif-option-label { font-size: 12px; font-weight: 700; color: var(--text); }
  .notif-option-time { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
  .notif-skip { font-size: 12px; color: var(--text-dim); text-align: center; margin-bottom: 8px; cursor: pointer; }
  .notif-skip:hover { color: var(--text-muted); }

  .class-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 18px; }
  @media (max-width: 380px) { .class-grid { grid-template-columns: 1fr; } }
  .class-card { border: 2px solid var(--card-border); border-radius: 10px; padding: 12px; cursor: pointer; transition: border-color 0.15s, background 0.15s; background: var(--bg2); }
  .class-card:hover { border-color: #3a3a58; background: #1e1e2e; }
  .class-card.selected { border-color: var(--purple); background: #1e1830; }
  .class-card-emoji { font-size: 22px; margin-bottom: 5px; }
  .class-card-name { font-weight: 700; font-size: 14px; margin-bottom: 3px; color: var(--text); }
  .class-card-desc { font-size: 11px; color: var(--text-muted); line-height: 1.4; }
  .class-card-perk { font-size: 10px; color: var(--text-dim); margin-top: 6px; padding-top: 6px; border-top: 1px solid var(--card-border); }
  .focus-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 18px; }
  .focus-chip { border: 2px solid var(--card-border); border-radius: 14px; padding: 10px 12px; cursor: pointer; transition: border-color 0.15s, background 0.15s; background: var(--bg2); }
  .focus-chip:hover { border-color: #3a3a58; }
  .focus-chip.selected { border-color: var(--purple); background: #1e1830; font-weight: 600; }
  .focus-chip-label { font-size: 13px; color: var(--text); }
  .focus-chip-stat { font-size: 10px; color: var(--text-dim); margin-top: 2px; }
  .ob-summary { background: var(--bg); border-radius: 14px; padding: 14px; margin-bottom: 18px; border: 1px solid var(--card-border); }
  .ob-sum-row { font-size: 13px; color: var(--text-muted); margin-bottom: 6px; }
  .ob-sum-row:last-child { margin-bottom: 0; }

  /* PROFILE */
  .profile-hero { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--card-border); }
  .profile-avatar { font-size: 40px; line-height: 1; }
  .profile-info { flex: 1; }
  .profile-name-big { font-size: 20px; font-weight: 700; color: var(--text); }
  .profile-meta { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
  .profile-class-quote { font-size: 12px; color: var(--text-muted); margin-top: 8px; font-style: italic; line-height: 1.5; }
  .perk-row { font-size: 12px; color: var(--text-muted); margin-bottom: 5px; padding-left: 12px; position: relative; }
  .perk-row::before { content:"→"; position:absolute; left:0; color: var(--text-dim); }
  .focus-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 6px; }
  .focus-tag { font-size: 11px; border: 1px solid var(--card-border); border-radius: 10px; padding: 3px 8px; color: var(--text-muted); }
  .profile-section { border-top: 1px solid var(--card-border); padding-top: 14px; margin-top: 14px; }
  .psec-title { font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; }
  .danger-zone { border-top: 1px solid #2a1010; padding-top: 14px; margin-top: 14px; }

  /* ── QUEST SUB-TABS ── */
  .sub-tab-bar {
    display: flex; gap: 0; margin-bottom: 12px;
    background: var(--bg2); border-radius: 14px; padding: 4px;
    border: 1px solid var(--card-border);
  }
  .sub-tab-btn {
    flex: 1; padding: 8px 4px; font-size: 12px; font-weight: 700;
    font-family: 'Nunito', sans-serif; border: none; background: none;
    color: var(--text-muted); cursor: pointer; border-radius: 10px;
    transition: background 0.15s, color 0.15s;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
  }
  .sub-tab-btn .st-icon { font-size: 16px; line-height: 1; }
  .sub-tab-btn.active { background: var(--card); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,0.3); }
  .sub-tab-btn .st-badge {
    font-size: 8px; background: var(--red); color: #fff;
    border-radius: 10px; padding: 1px 4px; font-weight: 700;
    min-width: 14px; text-align: center;
  }

  #toast { position: fixed; top: 14px; right: 14px; z-index: 999; max-width: 260px; pointer-events: none; }
  .toast-item { background: var(--card); border: 1px solid var(--card-border); border-radius: 14px; padding: 10px 14px; margin-bottom: 8px; font-family: 'Nunito', sans-serif; box-shadow: 0 4px 20px rgba(0,0,0,0.5); animation: toastIn 0.25s ease; }
  .toast-ttl { font-weight: 600; font-size: 13px; margin-bottom: 2px; color: var(--text); }
  .toast-bdy { font-size: 12px; color: var(--text-muted); }
  @keyframes toastIn { from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);} }

  /* ── CENTER NOTIFICATION ── */
  #center-notify {
    position: fixed; inset: 0; z-index: 9000;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }
  .cn-overlay {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(4px);
    animation: cnFadeIn 0.3s ease forwards;
  }
  .cn-box {
    position: relative; z-index: 1;
    background: var(--card);

  /* ── SPLASH SCREEN ── */
  #splash {
    position: fixed; inset: 0; z-index: 99999;
    background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center;

  .splash-rings {
    position: relative; width: 120px; height: 120px; margin-bottom: 28px;
  }
  .splash-ring {
    position: absolute; inset: 0; border-radius: 50%;
    border: 2px solid transparent;
    animation: splashSpin linear infinite;
  }
  .splash-ring:nth-child(1) { border-top-color: #9b6fef; animation-duration: 2s; }

  .splash-core {
    position: absolute; inset: 36px;
    background: radial-gradient(circle, #2a2050, #1a1a28);

  .splash-bar {

  }

    to   { opacity:1; transform:translateX(0); }
  }
</style>

// Focus mapping from question answers
const FOCUS_FROM_ANSWERS={
  goal:   {skills:"learning", create:"creative", money:"career",   mindset:"mindset", career:"career"},
  style:  {study:"learning",  build:"creative",  reflect:"mindset", execute:"productivity", all:null},
  bottleneck:{focus:"mindset",motiv:"mindset",time:"productivity",money:"career",start:"learning"},
};

function assignClassFromAnswers(answers){
  const scores={sage:0,artisan:0,rogue:0,monk:0,warrior:0};
  OB_QUESTIONS.forEach(q=>{
    const ans=answers[q.id];
    if(!ans)return;
    const opt=q.options.find(o=>o.val===ans);
    if(!opt)return;
    Object.entries(opt.scores).forEach(([cls,v])=>scores[cls]=(scores[cls]||0)+v);
  });
  // Pick highest
  let best="warrior",bestScore=-1;
  Object.entries(scores).forEach(([cls,s])=>{if(s>bestScore){bestScore=s;best=cls;}});
  return best;
}

function assignFocusesFromAnswers(answers){
  const focuses=[];
  // Primary: from goal
  const f1=FOCUS_FROM_ANSWERS.goal[answers.goal];
  if(f1)focuses.push(f1);
  // Secondary: from style or bottleneck
  const f2a=FOCUS_FROM_ANSWERS.style[answers.style];
  const f2b=FOCUS_FROM_ANSWERS.bottleneck[answers.bottleneck];
  const f2=f2a||f2b;
  if(f2&&f2!==f1)focuses.push(f2);
  // Ensure we have 2 by picking from bottleneck if needed
  if(focuses.length<2&&f2b&&!focuses.includes(f2b))focuses.push(f2b);
  return focuses.slice(0,2);
}

function today(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function getTierIndex(lvl){for(let i=TIERS.length-1;i>=0;i--){if(lvl>=TIERS[i].level)return i+1;}return 1;}
function getTier(lvl){return TIERS[getTierIndex(lvl)-1];}
function dateSeed(name=""){
  const d=new Date();
  const base=d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate();
  let nameSalt=0;for(let i=0;i<name.length;i++)nameSalt=(nameSalt*31+name.charCodeAt(i))>>>0;
  return(base+nameSalt)>>>0;
}

function seededShuffle(arr,seed){
  const a=[...arr];let s=seed>>>0;
  for(let i=a.length-1;i>0;i--){s=(Math.imul(s,1664525)+1013904223)>>>0;const j=s%(i+1);[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function getPreferStats(profile){
  const stats=new Set();
  const cl=CLASSES[profile.playerClass];
  if(cl)cl.bonusStats.forEach(s=>stats.add(s));
  (profile.focuses||[]).forEach(fid=>{const f=FOCUSES.find(x=>x.id===fid);if(f)stats.add(f.stat);});
  return stats;
}

function getFocusIds(profile){return new Set(profile.focuses||[]);}

    for(const stage of chain.stages){
      if(stage.rewardId===id)return{emoji:stage.rewardEmoji,title:stage.reward,desc:`${chain.name} — ${stage.title}`};

}

function resetDay(s){
  // Streak: if player completed at least 1 quest yesterday, keep/grow streak
  const t=today();
  if(s.lastReset&&s.lastReset!==t){
    const yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);
    const yStr=yesterday.getFullYear()+"-"+String(yesterday.getMonth()+1).padStart(2,"0")+"-"+String(yesterday.getDate()).padStart(2,"0");
    if(s.lastReset===yStr&&(s.dailyCompleted.length>0||s.lastStreakDate===yStr)){
      s.streak=(s.streak||0)+1;s.lastStreakDate=yStr;
    }else{
      s.streak=0;
    }
  }
  s.dailyCompleted=[];s.lastReset=t;
  const ti=getTierIndex(s.level);
  const slots=TIERS[ti-1].slots;
  const pStats=getPreferStats(s.profile);
  const pFocuses=getFocusIds(s.profile);
  const available=DAILY_POOL.filter(q=>q.minTier<=ti);
  const preferred=available.filter(q=>pFocuses.has(q.focus)||pStats.has(Object.keys(q.stats)[0]));
  const others=available.filter(q=>!preferred.find(p=>p.id===q.id));
  const seed=dateSeed(s.profile?.name||"");
  const shuffledPref=seededShuffle(preferred,seed);
  const shuffledOthers=seededShuffle(others,seed+1);
  const ordered=[...shuffledPref,...shuffledOthers];
  s.activeDailyIds=ordered.slice(0,slots).map(q=>q.id);
  s.poolQueue=ordered.slice(slots).map(q=>q.id);
}

function load(){
  try{
    const raw=localStorage.getItem("lifeRPG_v4");
    if(raw){
      const s={...BLANK,...JSON.parse(raw)};
      if(!s.profile)s.profile={...BLANK.profile};
      if(s.lastReset!==today())resetDay(s);
      if(!Array.isArray(s.activeDailyIds)||!s.activeDailyIds.length)resetDay(s);
      return s;
    }
    const old=localStorage.getItem("lifeRPG_v3");
    if(old){
      const o=JSON.parse(old);
      const s={...BLANK,level:o.level||1,xp:o.xp||0,gold:o.gold||0,totalGoldEarned:o.totalGoldEarned||0,stats:o.stats||BLANK.stats,purchases:o.purchases||{},log:(o.log||[]).slice(0,30)};
      resetDay(s);return s;
    }
    const s={...BLANK};resetDay(s);return s;
  }catch(e){const s={...BLANK};resetDay(s);return s;}
}

  new Notification("⚔️ Life RPG",{body,icon:"data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>"});

function checkNotifSchedule(){

  const now=new Date();
  const [hh,mm]=S.notifTime.split(":").map(Number);

  if(now.getHours()===hh&&now.getMinutes()===mm&&S.notifLastFired!==fireKey){

}

function getXPMult(q){
  const cl=CLASSES[S.profile.playerClass];
  if(!cl)return 1;
  const match=Object.keys(q.stats).some(s=>cl.bonusStats.includes(s));
  if(!match)return 1;
  return S.profile.playerClass==="warrior"?1.10:1.25;
}

function applyRewards(q){
  const mult=getXPMult(q);
  const cl=CLASSES[S.profile.playerClass];
  const goldMult=cl?cl.goldMult:1;
  const bonusXP=Math.round(q.xp*mult);
  const bonusGold=Math.round(q.gold*goldMult);
  Object.entries(q.stats).forEach(([s,v])=>{S.stats[s]=(S.stats[s]||0)+v;});
  S.xp+=bonusXP;S.gold+=bonusGold;S.totalGoldEarned+=bonusGold;
  const prevTier=getTierIndex(S.level);
  while(S.xp>=xpFor(S.level)){S.xp-=xpFor(S.level);S.level++;}
  const newTier=getTierIndex(S.level);
  if(newTier>prevTier){
    const tier=TIERS[newTier-1];
    addLog(`BRACKET UP → ${tier.emoji} ${tier.name}!`);
    setTimeout(()=>centerNotify(tier.emoji,"Bracket Unlocked",tier.name,"New content and rewards are now available!","#f0c040",3200),300);
    resetDay(S);
  }
  return bonusXP;
}

function completeQuest(id,isDaily){
  if(isDaily&&S.dailyCompleted.includes(id))return;
  if(!isDaily&&S.completedEpics.includes(id))return;
  let q=null;const prevLevel=S.level;
  if(isDaily){
    q=DAILY_POOL.find(x=>x.id===id)||S.customDailyQuests.find(x=>x.id===id);if(!q)return;
    S.dailyCompleted.push(id);
    if(DAILY_POOL.find(x=>x.id===id)){S.activeDailyIds=S.activeDailyIds.filter(x=>x!==id);if(S.poolQueue.length>0){const next=S.poolQueue.shift();S.activeDailyIds.push(next);}}
  }else{
    q=EPIC_POOL.find(x=>x.id===id)||S.customEpicQuests.find(x=>x.id===id);if(!q)return;S.completedEpics.push(id);
  }
  const bonusXP=applyRewards(q);const mult=getXPMult(q);
  const cl=CLASSES[S.profile.playerClass];const goldMult=cl?cl.goldMult:1;
  const statStr=Object.entries(q.stats).map(([s,v])=>`+${v} ${s}`).join(" · ");
  addLog(`"${q.title}" · +${Math.round(q.gold*goldMult)}G · +${bonusXP}XP · ${statStr}`);
  toast("Quest Complete!",`+${Math.round(q.gold*goldMult)}G · +${bonusXP}XP${mult>1?` (×${mult} class bonus)`:""}`);
  if(isDaily)S.totalDailyCompleted=(S.totalDailyCompleted||0)+1;
  else S.totalEpicsCompleted=(S.totalEpicsCompleted||0)+1;
  if(S.level>prevLevel){
    addLog(`LEVEL UP → Level ${S.level}!`);
    setTimeout(()=>centerNotify("⬆️","Level Up!",`Level ${S.level}`,"Keep grinding. You're unstoppable.","#9b6fef",2800),200);
  }
  checkMilestones();
  save();render();
}

window.obPickAnswer=function(qid,val){
  OB.answers[qid]=val;
  document.querySelectorAll(`.ob-option`).forEach(el=>el.classList.toggle("selected",el.dataset.val===val));
};

window.obNext=function(){
  const totalQ=OB_QUESTIONS.length; // 8
  const shopStep=totalQ+3;
  const notifStep=totalQ+4;
  if(OB.step===1){
    const name=document.getElementById("ob-name").value.trim();
    if(!name){alert("Enter your name.");return;}
    OB.name=name;OB.step=2;render();return;
  }
  // Steps 2 to totalQ+1 are the questions (step 2 = Q1, step totalQ+1 = Qlast)
  if(OB.step>=2&&OB.step<=totalQ+1){
    const q=OB_QUESTIONS[OB.step-2];
    if(!OB.answers[q.id]){toast("Pick an option","Choose one to continue.");return;}
    OB.step++;
    if(OB.step===totalQ+2){
      // Compute class + focuses
      OB.assignedClass=assignClassFromAnswers(OB.answers);
      OB.assignedFocuses=assignFocusesFromAnswers(OB.answers);
    }
    render();return;
  }
  // Class reveal step
  if(OB.step===totalQ+2){OB.step=shopStep;render();return;}
  // Shop step
  if(OB.step===shopStep){
    if(OB.shopCats.length<2){toast("Pick at least 2","Choose 2 or 3 reward categories.");return;}
    OB.step=notifStep;render();return;
  }
  // Notification step → finish
};

window.obBack=function(){
  if(OB.step>1){OB.step--;render();}
};

window.obFinish=function(){
  const cl=CLASSES[OB.assignedClass];
  S.profile={name:OB.name,playerClass:OB.assignedClass,focuses:OB.assignedFocuses,classApplied:true};
  S.rewardCategories=OB.shopCats.length>0?OB.shopCats:["food","gaming","entertainment"];
  Object.entries(cl.startBonus).forEach(([stat,val])=>{S.stats[stat]=val;});
  addLog(`${cl.emoji} ${OB.name} begins as a ${cl.name}.`);
  resetDay(S);save();
  OB={step:1,answers:{},assignedClass:"",assignedFocuses:[],notifChoice:"",shopCats:[]};
  TAB="quests";render();
};

window.openEditFocuses=function(){
  OB.answers={};
  OB.assignedFocuses=[...S.profile.focuses];
  OB.step=99;render();
};

window.saveFocuses=function(){
  S.profile.focuses=OB.assignedFocuses;
  resetDay(S);
  addLog(`Focus updated: ${OB.assignedFocuses.map(fid=>FOCUSES.find(f=>f.id===fid)?.label||fid).join(", ")}`);
  toast("Focus updated","Quest pool refreshed!");
  OB.step=1;TAB="quests";save();render();
};

window.confirmReset=function(){
  if(!confirm("This deletes ALL your progress. Are you sure?"))return;
  localStorage.removeItem("lifeRPG_v4");localStorage.removeItem("lifeRPG_v3");
  S={...BLANK,stats:{INT:5,WIS:5,CRE:5,GLD:5}};
  OB={step:1,answers:{},assignedClass:"",assignedFocuses:[],notifChoice:"",shopCats:[]};render();
};

  else if(OB.step===classRevealStep){

    body=`
      <div class="ob-step-label">Your class has been assigned</div>

        <span class="class-reveal-emoji">${cl.emoji}</span>

          ${cl.perks.map(p=>`<div class="class-reveal-perk">${p}</div>`).join("")}

  else if(OB.step===shopStep){
    const catCards=SHOP_CATS.map(c=>{
      const sel=(OB.shopCats||[]).includes(c.k);
      return`<button class="ob-option${sel?" selected":""}" data-val="${c.k}" onclick="obToggleShopCat('${c.k}')">

      </button>`;
    }).join("");
    const picked=(OB.shopCats||[]).length;

      <div class="ob-step-label">Almost there · Your rewards</div>

      {t:"09:00",emoji:"☀️",label:"Morning",   time:"9:00 AM"},

window.obToggleShopCat=function(k){
  if(!OB.shopCats)OB.shopCats=[];
  const idx=OB.shopCats.indexOf(k);
  if(idx>=0){OB.shopCats.splice(idx,1);}
  else{if(OB.shopCats.length>=3){toast("Max 3 categories","Deselect one first.");return;}OB.shopCats.push(k);}
  render();
};

window.obToggleEditFocus=function(fid){
  if(!OB.assignedFocuses)OB.assignedFocuses=[];
  const idx=OB.assignedFocuses.indexOf(fid);
  if(idx>=0){OB.assignedFocuses.splice(idx,1);}
  else{if(OB.assignedFocuses.length>=2){toast("Focus limit","Pick up to 2 areas.");return;}OB.assignedFocuses.push(fid);}
  document.querySelectorAll(".focus-chip").forEach(el=>el.classList.toggle("selected",(OB.assignedFocuses||[]).includes(el.dataset.fid)));
};

  return`<div class="quest${done?" done":""}">
    <div class="quest-top">

    <button class="btn btn-primary" onclick="generateQuests()" ${GEN_LOADING?"disabled":""}>${GEN_LOADING?"Generating...":"Generate quests ↗"}</button>
    ${GEN_ERR?`<div class="ai-err">Error: ${GEN_ERR}</div>`:""}
    ${GEN.length?`<div class="gen-list-label">Review and add what you want:</div>${GEN.map((q,i)=>{const isD=q.isDaily;const st=Object.entries(q.stats||{}).map(([s,v])=>`+${v} ${s}`).join(" ");return`<div class="gen-quest"><div class="gen-title">${q.title}</div><div class="gen-desc">${q.desc}</div><div class="gen-meta">${badge(q.diff)}<span class="tag-gold">+${q.gold}G</span><span class="tag-xp">+${q.xp}XP</span><span class="tag-stat">${st}</span>${q.dur?`<span style="font-size:11px;color:#999">⏱ ${q.dur}</span>`:""}</div><div class="gen-actions"><button class="btn btn-primary" onclick="addGenQuest(${i},${isD})">Add to ${isD?"dailies":"epics"}</button><button class="btn" onclick="dismissGen(${i})">Dismiss</button></div></div>`;}).join("")}`:""}
  </div>`;
  return`<div class="card"><div class="section-desc">Create your own quests. They appear immediately.</div>
    <div class="form-group"><label class="flabel">Quest title</label><input class="finput" type="text" id="cq-title" placeholder="e.g. Record my first video"></div>
    <div class="form-group"><label class="flabel">What exactly do you need to do?</label><textarea class="finput" id="cq-desc" placeholder="Be specific. Vague quests are easy to cheat."></textarea></div>
    <div class="frow"><div class="form-group"><label class="flabel">Type</label><select class="finput" id="cq-type"><option value="daily">Daily</option><option value="epic">Epic</option></select></div><div class="form-group"><label class="flabel">Difficulty</label><select class="finput" id="cq-diff"><option>Easy</option><option selected>Medium</option><option>Hard</option><option>Epic</option><option>Legendary</option></select></div></div>
    <div class="form-group"><label class="flabel">Duration (epic quests only)</label><input class="finput" type="text" id="cq-dur" placeholder="e.g. ~2 weeks"></div>
    <div class="form-group"><label class="flabel">Stat bonuses</label><div class="stat-checks">${statInputs}</div></div>
    <button class="btn btn-primary" onclick="addCustomQuest(document.getElementById('cq-type').value==='daily')">Add quest</button>${genBlock}</div>`;
}

function renderStats(){
  const ti=getTierIndex(S.level);
  const bars=Object.entries(SMETA).map(([k,m])=>{const v=S.stats[k];const pct=Math.min(100,Math.round(v/100*100));return`<div class="stat-full"><div class="stat-full-top"><div><strong>${m.label}</strong><span style="font-size:11px;color:#888;margin-left:8px">${m.desc}</span></div><strong>${v}</strong></div><div class="stat-bar-wrap"><div class="stat-bar" style="width:${pct}%;background:${m.color}"></div></div></div>`;}).join("");
  const bracketRows=TIERS.map((t,i)=>{const tn=i+1;const isCurrent=ti===tn;const isLocked=ti<tn;const nT=TIERS[i+1];const status=isCurrent?(nT?`<span class="bracket-status" style="color:${t.color}">${nT.level-S.level} lvl to next</span>`:`<span class="bracket-status" style="color:#8B6914">MAX ⭐</span>`):ti>tn?`<span class="bracket-status" style="color:#2d7a2d">✓ Reached</span>`:`<span class="bracket-status" style="color:#ccc">Lv.${t.level}</span>`;return`<div class="bracket-row" style="${isLocked?"opacity:0.45":""}"><div class="bracket-emoji">${t.emoji}</div><div class="bracket-info"><div class="bracket-name" style="color:${isLocked?"#ccc":t.color}">${t.name}</div><div class="bracket-req">${isLocked?"Requires Level "+t.level:isCurrent?"Current bracket":"Reached at Level "+t.level}</div><div class="bracket-unlocks">${t.unlocks.join(" · ")}</div></div>${status}</div>`;}).join("");
  return`<div class="card">${bars}<div class="lifetime"><div style="font-weight:600;font-size:13px;margin-bottom:8px">Lifetime</div><div class="lrow">Total gold earned: <strong>${S.totalGoldEarned}G</strong></div><div class="lrow">Epics completed: <strong>${S.completedEpics.length}</strong></div><div class="lrow">Rewards bought: <strong>${Object.values(S.purchases).reduce((a,b)=>a+b,0)}</strong></div><div class="lrow">Current level: <strong>${S.level}</strong></div></div><div class="brackets-section"><div style="font-weight:600;font-size:13px;margin-bottom:8px">Brackets</div>${bracketRows}</div></div>`;
}

window.setTitle=function(id){S.activeTitle=id;save();render();const d=findTitleDef(id);if(d)toast("Title equipped!",`${d.emoji} ${d.title}`);};

function renderProfile(){
  const cl=CLASSES[S.profile.playerClass];
  const focusTags=(S.profile.focuses||[]).map(fid=>{const f=FOCUSES.find(x=>x.id===fid);return f?`<span class="focus-tag">${f.label}</span>`:""}).join("");
  const notifLine=S.notifEnabled?`🔔 ${S.notifTime}`:"🔔 No reminder";

  // Settings card — always visible regardless of class
  const settingsCard=`
    <div class="card" style="margin-bottom:10px">
      <div class="psec-title" style="margin-bottom:10px">⚙️ Settings</div>
      <div style="display:flex;flex-direction:column;gap:8px">
        <div style="display:flex;align-items:center;justify-content:space-between">
          <div>
            <div style="font-size:13px;font-weight:600;color:var(--text)">Focus areas</div>
            <div class="focus-tags" style="margin-top:4px">${focusTags||`<span style="font-size:11px;color:#aaa">None set</span>`}</div>
          </div>
          <button class="btn" onclick="openEditFocuses()">Edit</button>
        </div>
        <div style="border-top:1px solid var(--card-border);padding-top:8px;display:flex;align-items:center;justify-content:space-between">
          <div>
            <div style="font-size:13px;font-weight:600;color:var(--text)">Daily reminder</div>
            <div style="font-size:11px;color:var(--text-muted);margin-top:2px">${notifLine}</div>
          </div>
          <button class="btn" onclick="changeNotifTime()">${S.notifEnabled?"Change":"Set up"}</button>
        </div>
        ${S.notifEnabled?`<button class="btn" style="font-size:11px;color:var(--text-dim)" onclick="toggleNotif()">Turn off reminders</button>`:""}
        <div style="border-top:1px solid #2a1010;padding-top:8px">
          <button class="btn btn-danger" style="width:100%" onclick="confirmReset()">🗑 Reset all progress</button>
        </div>
      </div>
    </div>`;

  // If no class assigned yet, just show settings
  if(!cl){
    return`<div>
      <div class="card" style="margin-bottom:10px;text-align:center;padding:20px">
        <div style="font-size:28px;margin-bottom:8px">⚠️</div>
        <div style="font-weight:700;font-size:15px;color:var(--text);margin-bottom:6px">Class not assigned</div>
        <div style="font-size:12px;color:var(--text-muted);margin-bottom:14px">Your profile is incomplete. Reset to go through the full setup.</div>
      </div>
      ${settingsCard}
    </div>`;
  }

  const statBonus=Object.entries(cl.startBonus).map(([s,v])=>`+${v} ${s}`).join(" · ");
  const perkList=cl.perks.map(p=>`<div class="perk-row">${p}</div>`).join("");
  const activeMilestone=S.activeTitle?findTitleDef(S.activeTitle):null;

  // Milestone wall
  const unlockedIds=new Set(S.unlockedMilestones||[]);
  const unlockedMs=MILESTONES.filter(m=>unlockedIds.has(m.id));
  const lockedMs=MILESTONES.filter(m=>!unlockedIds.has(m.id));
  const milestoneWall=`
    <div class="card" style="margin-bottom:10px">
      <div class="psec-title">🏅 Titles & Milestones <span style="color:var(--text-dim);font-weight:400">(${unlockedMs.length}/${MILESTONES.length} unlocked)</span></div>
      ${unlockedMs.length===0?`<div style="font-size:12px;color:var(--text-dim);margin-bottom:10px">Complete quests to unlock your first title.</div>`:""}
      ${unlockedMs.map(m=>{const col=getMilestoneColor(m.id);return`<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 10px 8px 12px;margin-bottom:5px;border-radius:10px;background:${col}12;border:1px solid ${col}40;border-left:3px solid ${col};animation:milestoneRowIn 0.3s ease both">
        <div style="display:flex;align-items:center;gap:10px">
          <span style="font-size:20px;filter:drop-shadow(0 0 4px ${col}88)">${m.emoji}</span>
          <div>
            <div style="font-weight:700;font-size:13px;color:var(--text)">${m.title}</div>
            <div style="font-size:11px;color:var(--text-muted)">${m.desc}</div>
          </div>
        </div>
        <button class="btn${S.activeTitle===m.id?" btn-primary":""}" style="font-size:11px;padding:4px 10px;border-color:${S.activeTitle===m.id?"var(--purple)":col}40" onclick="setTitle('${m.id}')">
          ${S.activeTitle===m.id?"✓ Active":"Equip"}
        </button>
      </div>`;}).join("")}
      ${lockedMs.length>0?`<div style="margin-top:12px;font-size:11px;color:var(--text-dim);font-weight:700;margin-bottom:6px">LOCKED</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px">
        ${lockedMs.map(m=>`<div style="opacity:0.35;font-size:11px;border:1px solid var(--card-border);border-radius:10px;padding:4px 8px;color:var(--text-muted)">🔒 ${m.title}</div>`).join("")}
      </div>`:""}
    </div>`;

  return`<div>
    <div class="card" style="margin-bottom:10px">
      <div class="profile-hero">
        <div class="profile-avatar">${cl.emoji}</div>
        <div class="profile-info">
          <div class="profile-name-big">${S.profile.name}</div>
          ${activeMilestone?`<div style="font-size:12px;color:var(--gold);font-weight:700;margin-top:2px">${activeMilestone.emoji} ${activeMilestone.title}</div>`:""}
          <div class="profile-meta">Level ${S.level} ${cl.name} · ${getTier(S.level).emoji} ${getTier(S.level).name}${S.streak>0?` · 🔥 ${S.streak} day streak`:""}</div>
          <div class="profile-class-quote">"${cl.desc}"</div>
        </div>
      </div>
      <div class="psec-title">Class perks</div>${perkList}
      <div style="font-size:11px;color:var(--text-dim);margin-top:8px">${statBonus}</div>
    </div>
    ${settingsCard}
    ${milestoneWall}
  </div>`;
}

function renderLog(){
  const rows=S.log.length?S.log.map(e=>`<div class="log-entry"><span class="log-time">${e.time}</span><span class="log-msg">${e.msg}</span></div>`).join(""):`<div class="empty-msg">Nothing yet. Complete a quest to start your story.</div>`;
  return`<div class="card"><div class="section-desc">Everything you've done. Your story.</div>${rows}</div>`;
}

function renderChallenges(){
  if(!S.challengeSteps)S.challengeSteps={};
  if(!S.completedChainStages)S.completedChainStages=[];
  const cards=CHALLENGE_CHAINS.map(chain=>{
    const isHidden=chain.hidden&&!chain.revealCondition(S);
    if(isHidden){
      return`<div class="card" style="opacity:0.5;text-align:center;padding:20px">
        <div style="font-size:28px;margin-bottom:8px">🔒</div>
        <div style="font-weight:700;font-size:15px;color:var(--text-muted)">??? Hidden Path</div>
        <div style="font-size:12px;color:var(--text-dim);margin-top:6px">${chain.revealHint}</div>
      </div>`;
    }
    // Find current active stage
    let activeStageIdx=0;
    for(let i=0;i<chain.stages.length;i++){
      if(S.completedChainStages.includes(chain.stages[i].rewardId))activeStageIdx=i+1;
      else break;
    }
    const isChainComplete=activeStageIdx>=chain.stages.length;
    // Completed stages summary
    const completedBadges=chain.stages.slice(0,activeStageIdx).map(st=>`
      <div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--card-border)">
        <span style="font-size:16px">${st.rewardEmoji}</span>
        <div>
          <div style="font-size:12px;font-weight:700;color:var(--green)">✓ ${st.reward} earned</div>
          <div style="font-size:11px;color:var(--text-dim)">${st.title}</div>
        </div>
        <button class="btn${S.activeTitle===st.rewardId?" btn-primary":""}" style="margin-left:auto;font-size:10px;padding:3px 8px" onclick="setTitle('${st.rewardId}')">${S.activeTitle===st.rewardId?"✓ Active":"Equip"}</button>
      </div>`).join("");
    // Active stage
    let activeStageHtml="";
    if(!isChainComplete){
      const stage=chain.stages[activeStageIdx];
      const stepsDone=stage.steps.filter(s=>S.challengeSteps[s.id]).length;
      const allDone=stepsDone===stage.steps.length;
      const stepsHtml=stage.steps.map(s=>`
        <label style="display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid #1e1e2e;cursor:pointer">
          <input type="checkbox" ${S.challengeSteps[s.id]?"checked":""} onchange="toggleStep('${s.id}')" style="margin-top:2px;accent-color:var(--purple);width:16px;height:16px;flex-shrink:0">
          <span style="font-size:13px;color:${S.challengeSteps[s.id]?"var(--text-dim)":"var(--text)"};${S.challengeSteps[s.id]?"text-decoration:line-through":""};line-height:1.5">${s.text}</span>
        </label>`).join("");
      activeStageHtml=`
        <div style="margin-top:${activeStageIdx>0?14:0}px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
            <div>
              <div style="font-size:12px;font-weight:700;color:var(--text-muted)">${stage.title}</div>
              <div style="font-size:11px;color:var(--text-dim)">${stepsDone}/${stage.steps.length} steps complete</div>
            </div>
            <div style="text-align:right">
              <div style="font-size:18px">${stage.rewardEmoji}</div>
              <div style="font-size:10px;color:var(--gold);font-weight:700">${stage.reward}</div>
            </div>
          </div>
          <div style="height:4px;background:var(--bg);border-radius:2px;margin-bottom:12px;overflow:hidden">
            <div style="height:100%;width:${Math.round(stepsDone/stage.steps.length*100)}%;background:var(--purple);border-radius:2px;transition:width 0.4s"></div>
          </div>
          ${stepsHtml}
          ${allDone?`<button class="btn btn-primary" style="margin-top:12px;width:100%" onclick="claimStage('${stage.rewardId}','${chain.id}',${activeStageIdx})">🏅 Claim Title: ${stage.rewardEmoji} ${stage.reward}</button>`:""}
        </div>`;
    }
    const chainColor=chain.focus?{learning:"#2d7a2d",mindset:"#1a6a9a",creative:"#7b3fcf",career:"#a07800",networking:"#c0392b",productivity:"#d4870a"}[chain.focus]||"#888":"#7b3fcf";
    return`<div class="card">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
        <span style="font-size:26px">${chain.emoji}</span>
        <div>
          <div style="font-weight:800;font-size:15px;color:var(--text)">${chain.name}</div>
          <div style="font-size:11px;color:var(--text-dim)">${isChainComplete?"✨ Chain complete":"Stage ".concat(activeStageIdx+1," of ",chain.stages.length)}</div>
        </div>
        ${isChainComplete?`<span style="margin-left:auto;font-size:11px;color:var(--green);font-weight:700">COMPLETE</span>`:""}
      </div>
      ${completedBadges}
      ${isChainComplete?"":`${activeStageHtml}`}
    </div>`;
  }).join("");
  const anyUnlocked=S.completedChainStages&&S.completedChainStages.length>0;
  return`<div>
    <div class="card" style="margin-bottom:10px">
      <div style="font-weight:700;font-size:14px;color:var(--text);margin-bottom:4px">⚔️ Challenge Paths</div>
      <div class="section-desc">Real-life multi-step challenges. Complete every step in a stage to earn a unique title. Steps are self-reported — your honor system.</div>
    </div>
    ${cards}
  </div>`;
}

function renderQuestHub(){
  const ti=getTierIndex(S.level);
  const dDone=S.dailyCompleted.filter(id=>S.activeDailyIds.includes(id)||S.customDailyQuests.some(q=>q.id===id)).length;
  const dTotal=S.activeDailyIds.length+S.customDailyQuests.length;
  const dPending=dTotal-dDone;
  const subTabs=[
    {k:"dailies",    icon:"⚔️", label:"Dailies",    badge:dPending>0?dPending:0},
    {k:"epics",      icon:"🗺️", label:"Epics",      badge:0},
    {k:"challenges", icon:"🏅", label:"Challenges", badge:0},
  ];
  const subBar=`<div class="sub-tab-bar">${subTabs.map(t=>`
    <button class="sub-tab-btn${QTAB===t.k?" active":""}" onclick="go_q('${t.k}')">
      <span class="st-icon">${t.icon}</span>
      <span>${t.label}</span>
      ${t.badge?`<span class="st-badge">${t.badge}</span>`:""}
    </button>`).join("")}</div>`;
  if(QTAB==="dailies") return subBar+renderQuests();
  if(QTAB==="epics")   return subBar+renderEpics();
  return subBar+renderChallenges();
}

const TABS={quests:renderQuestHub,shop:renderShop,stats:renderStats,profile:renderProfile,log:renderLog};

function render(){
  if(!S.profile.name){document.getElementById("app").innerHTML=renderOnboarding();document.getElementById("bottom-nav").style.display="none";return;}
  document.getElementById("bottom-nav").style.display="flex";
  if(OB.step===99){document.getElementById("app").innerHTML=renderEditFocuses();renderTabs();return;}
  OB.step=1;
  renderTabs();
  document.getElementById("app").innerHTML=renderHeader()+(TABS[TAB]||renderQuests)();
}

window.go=t=>{TAB=t;OB.step=1;render();};
window.go_q=t=>{QTAB=t;render();};
window.completeQuest=completeQuest;
window.deleteQuest=deleteQuest;
window.buyReward=buyReward;
window.addCustomQuest=addCustomQuest;
window.generateQuests=generateQuests;
window.addGenQuest=addGenQuest;
window.dismissGen=dismissGen;

window.toggleNotif=function(){S.notifEnabled=false;save();render();toast("Reminders off","You can re-enable anytime in Profile.");};

window.changeNotifTime=async function(){
  const val=prompt(`Set reminder time (24hr format, e.g. 08:00)\nCurrent: ${S.notifTime||"not set"}\n\nEnter any time like 06:30 or 20:00`,"");
  if(!val)return;
  const trimmed=val.trim();
  if(!/^\d{1,2}:\d{2}$/.test(trimmed)){toast("Invalid format","Use HH:MM like 08:00 or 20:30");return;}
  const granted=await requestNotifPermission();
  if(!granted){toast("Notifications blocked","Enable them in browser settings.");return;}
  S.notifEnabled=true;S.notifTime=trimmed;save();render();toast("Reminder updated!",`Daily nudge at ${trimmed}`);
};

save();render();
</script>
</body>
</html>
